server:
    address: :6732
    utility_address: :9583
vaults:
    ledger:
        driver: ledger
        config:
            close_after: 3600s
            keys:
                - bip25519/0'/0'
                - ed25519/0'/0'
                - secp256k1/0'/0'
                - P-256/0'/0'
            transport: tcp://speculos:9999
    local_secret:
        driver: file
        config:
            file: /etc/secret.json
