dockers:
  - ids:
      - mavseal-linux-amd
      - mavseal-cli-linux-amd
    image_templates:
      - '{{ if .IsSnapshot }}ghcr.io/{{ end }}mavryk-network/mavseal:{{ if .IsSnapshot }}{{ .FullCommit }}{{ else }}{{ .Tag }}{{ end }}-amd64'
      - '{{ if not .IsSnapshot }}mavryk-network/mavseal:latest-amd64{{ end }}'
    dockerfile: goreleaser.dockerfile
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.name={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--platform=linux/amd64"
  - ids:
      - mavseal-linux-arm64
      - mavseal-cli-linux-arm64
    image_templates:
      - '{{ if .IsSnapshot }}ghcr.io/{{ end }}mavryk-network/mavseal:{{ if .IsSnapshot }}{{ .FullCommit }}{{ else }}{{ .Tag }}{{ end }}-arm64'
      - '{{ if not .IsSnapshot }}mavryk-network/mavseal:latest-arm64{{ end }}'
    dockerfile: goreleaser.dockerfile
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.name={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--platform=linux/arm64"
    goarch: arm64
  - ids:
      - mavseal-linux-arm
      - mavseal-cli-linux-arm
    image_templates:
      - '{{ if .IsSnapshot }}ghcr.io/{{ end }}mavryk-network/mavseal:{{ if .IsSnapshot }}{{ .FullCommit }}{{ else }}{{ .Tag }}{{ end }}-armv7'
      - '{{ if not .IsSnapshot }}mavryk-network/mavseal:latest-armv7{{ end }}'
    dockerfile: goreleaser.dockerfile
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.name={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--platform=linux/arm/v7"
    goarch: arm
    goarm: '7'

docker_manifests:
  - name_template: 'mavryk-network/mavseal:latest'
    image_templates:
      - 'mavryk-network/mavseal:latest-amd64'
      - 'mavryk-network/mavseal:latest-arm64'
      - 'mavryk-network/mavseal:latest-armv7'
  - name_template: 'mavryk-network/mavseal:{{ .Tag }}'
    image_templates:
      - 'mavryk-network/mavseal:{{ .Tag }}-amd64'
      - 'mavryk-network/mavseal:{{ .Tag }}-arm64'
      - 'mavryk-network/mavseal:{{ .Tag }}-armv7'

checksum:
  name_template: checksums.txt
snapshot:
  name_template: 'SNAPSHOT-{{.ShortCommit}}'
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^website:'
      - '^test:'

release:
  prerelease: auto
