builds:
# LINUX
  - id: mavseal-linux-amd
    binary: mavseal
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
      - >-
        {{- if .IsSnapshot }}GOEXPERIMENT=coverageredesign{{- end }}
    main: ./cmd/mavseal/main.go
    ldflags:
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: mavseal-cli-linux-amd
    binary: mavseal-cli
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
      - >-
        {{- if .IsSnapshot }}GOEXPERIMENT=coverageredesign{{- end }}
    main: ./cmd/mavseal-cli/main.go
    ldflags:
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: mavseal-linux-arm64
    binary: mavseal
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
      - >-
        {{- if .IsSnapshot }}GOEXPERIMENT=coverageredesign{{- end }}
    main: ./cmd/mavseal/main.go
    ldflags:
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: mavseal-cli-linux-arm64
    binary: mavseal-cli
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
      - >-
        {{- if .IsSnapshot }}GOEXPERIMENT=coverageredesign{{- end }}
    main: ./cmd/mavseal-cli/main.go
    ldflags:
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: mavseal-linux-arm
    binary: mavseal
    env:
      - CGO_ENABLED=1
      - CC=arm-linux-gnueabihf-gcc
      - CXX=arm-linux-gnueabihf-g++
      - >-
        {{- if .IsSnapshot }}GOEXPERIMENT=coverageredesign{{- end }}
    main: ./cmd/mavseal/main.go
    ldflags:
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - '6'
      - '7'
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

  - id: mavseal-cli-linux-arm
    binary: mavseal-cli
    env:
      - CGO_ENABLED=1
      - CC=arm-linux-gnueabihf-gcc
      - CXX=arm-linux-gnueabihf-g++
      - >-
        {{- if .IsSnapshot }}GOEXPERIMENT=coverageredesign{{- end }}
    main: ./cmd/mavseal-cli/main.go
    ldflags:
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitRevision={{.Version}}'
      - '-X github.com/mavryk-network/mavseal/pkg/metrics.GitBranch={{.Version}}'
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - '6'
      - '7'
    flags:
      - '{{ if .IsSnapshot }}-cover{{ else }}-v{{ end }}'

